# ==============================================================================
# 控制器服务器配置 - MPPI（麦克纳姆轮专用）
# ==============================================================================
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 5.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 6.28

    # ========================================
    # MPPI 控制器 - 麦克纳姆轮全向移动配置
    # ========================================
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      
      # 时间参数
      time_steps: 30
      model_dt: 0.05
      batch_size: 1000
      
      # 关键：速度约束（必须明确设置正负值）
      vx_std: 0.2
      vy_std: 0.3                # Y 方向探索标准差（必须 > 0）
      wz_std: 0.0
      
      vx_max: 0.2                # X 最大正向速度
      vx_min: -0.2              # X 最大反向速度（关键：允许后退）
      vy_max: 0.2                # Y 最大正向速度（横向左移）
      vy_min: -0.2               # Y 最大反向速度（横向右移）
      wz_max: 0.0                # 旋转速度
      
      # 关键：运动模型（大小写敏感，必须是 "Omni"）
      motion_model: "Omni"
      
      temperature: 0.3
      visualize: true
      
      # 代价函数配置（删除 PreferForward，添加 PathAngle）
      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", 
                "PathAlignCritic", "PathFollowCritic"]
      
      ConstraintCritic:
        enabled: true
        cost_weight: 4.0
      
      ObstaclesCritic:
        enabled: true
        cost_weight: 1.5
        consider_footprint: true
        collision_cost: 10000.0
        inflation_radius: 0.5
      
      GoalCritic:
        enabled: true
        cost_weight: 5.0
      
      PathAlignCritic:
        enabled: true
        cost_weight: 10.0        # 提高到10.0，让路径对齐更紧凑
        offset_from_furthest: 10
        threshold_to_consider: 0.5
      
      PathFollowCritic:
        enabled: true
        cost_weight: 10.0        # 提高路径跟踪权重
        offset_from_furthest: 5
        threshold_to_consider: 1.0

# ==============================================================================
# 局部代价地图配置
# ==============================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 15.0    # 提高到15Hz，减少延迟
      publish_frequency: 10.0   # 提高到10Hz
      global_frame: odom
      robot_base_frame: chassis
      use_sim_time: True
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      footprint: "[ [-0.14, -0.092], [0.14, -0.092], [0.14, 0.092], [-0.14, 0.092] ]"
      transform_tolerance: 0.3   # 降低到0.3秒，强制更快更新
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.2
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      always_send_full_costmap: true

# ==============================================================================
# 全局代价地图配置
# ==============================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0     # 提高到5Hz，加速障碍物更新
      publish_frequency: 5.0    # 提高到5Hz
      global_frame: map
      robot_base_frame: chassis
      use_sim_time: True
      footprint: "[ [-0.14, -0.092], [0.14, -0.092], [0.14, 0.092], [-0.14, 0.092] ]"
      resolution: 0.05
      track_unknown_space: true
      transform_tolerance: 0.3    # 关键修改：降低到0.3秒
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.2
      always_send_full_costmap: true

# ==============================================================================
# 地图服务器配置
# ==============================================================================
map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: True
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

# ==============================================================================
# 规划服务器配置
# ==============================================================================
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

# ==============================================================================
# 路径平滑服务器配置
# ==============================================================================
smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# ==============================================================================
# 行为服务器配置
# ==============================================================================
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: chassis
    transform_tolerance: 0.3  # 降低到0.3秒，强制更快更新TF
    use_sim_time: True
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.0
    min_rotational_vel: 0.0
    rotational_acc_lim: 3.2

# ==============================================================================
# 机器人状态发布器配置
# ==============================================================================
robot_state_publisher:
  ros__parameters:
    use_sim_time: True

# ==============================================================================
# 航点跟随器配置
# ==============================================================================
waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# ==============================================================================
# 速度平滑器配置
# ==============================================================================
velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # 关键修复：给 Y 方向速度设置非零值！
    max_velocity: [0.5, 0.5, 0.0]      # [vx_max, vy_max, wz_max]
    min_velocity: [-0.5, -0.5, 0.0]   # [vx_min, vy_min, wz_min]
    max_accel: [2.5, 2.5, 0.0]         # [ax, ay, alpha]
    max_decel: [-2.5, -2.5, 0.0]      # 减速限制
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0